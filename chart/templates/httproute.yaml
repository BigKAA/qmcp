{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "qmcp.fullname" . }}
  labels:
    {{- include "qmcp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: ingress
      namespace: default
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.path | quote }}
      backendRefs:
        - name: {{ include "qmcp.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
