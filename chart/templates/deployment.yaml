apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qmcp.fullname" . }}
  labels:
    {{- include "qmcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qmcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "qmcp.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "qmcp.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: qmcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: QDRANT_URL
              value: {{ .Values.env.QDRANT_URL | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.env.EMBEDDING_MODEL | quote }}
            - name: WATCH_PATHS
              value: {{ .Values.env.WATCH_PATHS | quote }}
            - name: BATCH_SIZE
              value: {{ .Values.env.BATCH_SIZE | quote }}
            - name: DEBOUNCE_SECONDS
              value: {{ .Values.env.DEBOUNCE_SECONDS | quote }}
            - name: HOST
              value: {{ .Values.env.HOST | quote }}
            - name: PORT
              value: {{ .Values.env.PORT | quote }}
            - name: TRANSPORT
              value: {{ .Values.env.TRANSPORT | quote }}
          {{- if .Values.volume.enabled }}
          volumeMounts:
            - name: repo-data
              mountPath: {{ .Values.volume.mountPath }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.volume.enabled }}
      volumes:
        - name: repo-data
          persistentVolumeClaim:
            claimName: {{ include "qmcp.fullname" . }}-pvc
      {{- end }}
