apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "qmcp.fullname" . }}
  labels:
    {{- include "qmcp.labels" . | nindent 4 }}
data:
  QDRANT_URL: {{ .Values.env.QDRANT_URL | quote }}
  EMBEDDING_MODEL: {{ .Values.env.EMBEDDING_MODEL | quote }}
  WATCH_PATHS: {{ .Values.env.WATCH_PATHS | quote }}
  BATCH_SIZE: {{ .Values.env.BATCH_SIZE | quote }}
  DEBOUNCE_SECONDS: {{ .Values.env.DEBOUNCE_SECONDS | quote }}
  HOST: {{ .Values.env.HOST | quote }}
  PORT: {{ .Values.env.PORT | quote }}
  TRANSPORT: {{ .Values.env.TRANSPORT | quote }}
